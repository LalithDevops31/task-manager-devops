apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: task-manager
data:
  config.yaml: |-
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch:
    exporters:
      debug:
        verbosity: detailed
      elasticsearch:
        endpoints:
          - http://elasticsearch-master.logging.svc.cluster.local:9200
        traces_index: traces
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [elasticsearch, debug]